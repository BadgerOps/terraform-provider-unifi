repos:
  - repo: local
    hooks:
      - id: sync-version-references
        name: Sync version references from CHANGELOG.md
        entry: ./scripts/sync-version.sh --check
        language: system
        pass_filenames: false
        always_run: true
      - id: generated-docs
        name: Check generated docs
        entry: make docs-check
        language: system
        pass_filenames: false
        always_run: true
