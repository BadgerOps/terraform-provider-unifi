name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install archive tooling
        run: sudo apt-get update && sudo apt-get install -y gnupg zip

      - name: Read release metadata from changelog
        id: changelog
        run: |
          chmod +x ./scripts/read-changelog-release.sh
          ./scripts/read-changelog-release.sh CHANGELOG.md >> "${GITHUB_OUTPUT}"

      - name: Validate release version
        run: |
          version="${{ steps.changelog.outputs.version }}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid semver version in CHANGELOG.md: ${version}" >&2
            exit 1
          fi

      - name: Check if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.changelog.outputs.version }}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build release artifacts
        if: steps.exists.outputs.exists == 'false'
        run: make release-artifacts VERSION="${{ steps.changelog.outputs.version }}"

      - name: Sign release artifacts
        if: steps.exists.outputs.exists == 'false'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY}" || -z "${PASSPHRASE}" ]]; then
            echo "GPG_PRIVATE_KEY and PASSPHRASE repository secrets are required for Terraform Registry releases." >&2
            exit 1
          fi
          make sign-release-artifacts VERSION="${{ steps.changelog.outputs.version }}"

      - name: Create GitHub release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<'EOF'
          ${{ steps.changelog.outputs.notes }}
          EOF
          mapfile -t release_files < <(find dist/release -maxdepth 1 -type f | sort)
          gh release create "v${{ steps.changelog.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "v${{ steps.changelog.outputs.version }}" \
            --notes-file "${notes_file}" \
            "${release_files[@]}"
